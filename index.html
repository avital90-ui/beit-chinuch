async function fbGet(p){try{const s=await getDoc(doc(db,...p.split("/")));return s.exists()?s.data():null}catch{return null}}
async function fbSet(p,d){try{await setDoc(doc(db,...p.split("/")),d)}catch(e){showToast("שגיאת שמירה","error")}}
function sub(p,cb){if(LS[p])return;LS[p]=onSnapshot(doc(db,...p.split("/")),s=>{cb(s.exists()?s.data():null)},()=>{})}
// ── HELPERS ──────────────────────────────────────────────────
function fmt(n){return"₪"+Number(n||0).toLocaleString("he-IL",{minimumFractionDigits:0,maximumFractionDigits:0})}
function curMonth(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`}
function curWeek(){const d=new Date(),day=d.getDay(),m=new Date(d);m.setDate(d.getDate()-day);return m.toISOString().split("T")[0]}
function weekDates(ws){const d=new Date(ws),r=[];for(let i=0;i<6;i++){const dd=new Date(d);dd.setDate(d.getDate()+i);r.push(dd.toISOString().split("T")[0])}return r}
function mLabel(ym){const[y,m]=ym.split("-");return`${MONTHS[+m-1]} ${y}`}
function dLabel(d){const dd=new Date(d);return`${DAYS[dd.getDay()]} ${dd.getDate()}/${dd.getMonth()+1}`}
function hById(id){return HOUSES.find(h=>h.id===id)}
function cById(id){return CATS.find(c=>c.id===id)}
function showToast(msg,t="success"){const el=document.getElementById("toast");el.textContent=msg;el.style.background=t==="error"?"#ef4444":"#22c55e";el.style.opacity="1";el.style.transform="translateX(-50%) translateY(0)";setTimeout(()=>{el.style.opacity="0";el.style.transform="translateX(-50%) translateY(20px)"},3000)}
function openModal(html,fn){const ov=document.getElementById("overlay"),m=document.getElementById("modal");m.innerHTML=html;ov.style.display="flex";if(fn)fn()}

// ── BUDGET MODAL (per-category monthly breakdown) ──────────────
function openBudgetModal(){
  const house=hById(AH),data=BD(AH),cb=data.categoryBudgets||{};
  const yr=AM.split("-")[0];
  let activeCat=CATS[0].id;
  function buildCatPanel(catId){
    const cat=CATS.find(c=>c.id===catId);
    const cc=cb[catId]||{annual:0,monthly:{}};
    const annualBudget=cc.annual||0;
    const monthlyData=cc.monthly||{};
    const monthlySum=Object.values(monthlyData).reduce((s,v)=>s+(+v||0),0);
    const remaining=annualBudget-monthlySum;
    return`<div id="catPanel">
      <div style="background:${house.bg};border-radius:10px;padding:12px 14px;margin-bottom:12px">
        <div style="font-size:14px;font-weight:800;color:${house.color};margin-bottom:8px">${cat.icon} ${cat.name}</div>
        <div style="display:flex;gap:8px;align-items:center">
          <div style="flex:1"><label style="font-size:10px;font-weight:700;color:#888;display:block;margin-bottom:3px">תקציב שנתי כולל (₪)</label>
            <input type="number" id="annualInp" value="${annualBudget||""}" placeholder="0" class="input" style="padding:8px 10px;font-size:14px;font-weight:700"/></div>
          <div style="text-align:center;padding-top:16px">
            <div style="font-size:10px;color:#888">נותר לחלוקה</div>
            <div id="remainDisp" style="font-size:16px;font-weight:800;color:${remaining>=0?house.color:"#dc2626"}">₪${remaining.toLocaleString("he-IL")}</div>
          </div>
        </div>
      </div>
      <div style="font-size:11px;font-weight:700;color:#666;margin-bottom:8px">חלוקה חודשית — ${yr}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        ${Array.from({length:12},(_,i)=>{
          const k=`${yr}-${String(i+1).padStart(2,"0")}`;
          const v=monthlyData[k]||"";
          return`<div style="padding:7px 9px;background:#fafafa;border-radius:8px;border:1.5px solid #eee">
            <label style="font-size:10px;font-weight:700;color:#666;display:block;margin-bottom:3px">${MONTHS[i]}</label>
            <input type="number" class="input mMI" data-key="${k}" value="${v}" placeholder="0" style="padding:5px 7px;font-size:12px"/>
          </div>`;
        }).join("")}
      </div>
      <div style="margin-top:10px;padding:8px 12px;background:#f9fafb;border-radius:8px;display:flex;justify-content:space-between">
        <span style="font-size:11px;color:#888">סה"כ חודשי מוקצב:</span>
        <span id="mSum" style="font-size:13px;font-weight:800;color:${house.color}">₪${monthlySum.toLocaleString("he-IL")}</span>
      </div>
    </div>`;
  }
  const catBtns=CATS.map(cat=>`<button class="cbtn btn" data-cid="${cat.id}" style="padding:6px 12px;font-size:12px;background:${activeCat===cat.id?house.color:"#f0f0f0"};color:${activeCat===cat.id?"#fff":"#555"};white-space:nowrap">${cat.icon} ${cat.name}</button>`).join("");
  openModal(`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h2 style="margin:0;font-size:16px;font-weight:700">⚙️ תקציב – ${house.name}</h2>
      <button id="closeModal" style="background:none;border:none;font-size:19px;cursor:pointer">✕</button>
    </div>
    <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px" id="catBtns">${catBtns}</div>
    <div id="catPanel">${buildCatPanel(activeCat)}</div>
    <div style="display:flex;gap:7px;margin-top:14px;padding-top:12px;border-top:1px solid #f0f0f0">
      <button id="saveBB" class="btn" style="flex:1;background:${house.color};color:#fff">שמור</button>
      <button id="cancelBB" class="btn" style="border:1.5px solid #ddd;background:#fff;color:#666">ביטול</button>
    </div>`,()=>{
    document.getElementById("closeModal").addEventListener("click",closeModal);
    document.getElementById("cancelBB").addEventListener("click",closeModal);
    function recalc(){
      const annual=+document.getElementById("annualInp")?.value||0;
      const ms=Array.from(document.querySelectorAll(".mMI")).reduce((s,i)=>s+(+i.value||0),0);
      const rem=annual-ms;
      const rd=document.getElementById("remainDisp");
      const msd=document.getElementById("mSum");
      if(rd){rd.textContent="₪"+rem.toLocaleString("he-IL");rd.style.color=rem>=0?hById(AH).color:"#dc2626";}
      if(msd)msd.textContent="₪"+ms.toLocaleString("he-IL");
    }
    document.addEventListener("input",e=>{if(e.target.classList.contains("mMI")||e.target.id==="annualInp")recalc()});
    function saveCurrentCat(){
      const annual=+document.getElementById("annualInp")?.value||0;
      const monthly={};
      document.querySelectorAll(".mMI").forEach(i=>{const v=+i.value||0;if(v>0)monthly[i.dataset.key]=v});
      if(!cb[activeCat])cb[activeCat]={};
      cb[activeCat]={annual,monthly};
    }
    document.querySelectorAll(".cbtn").forEach(btn=>btn.addEventListener("click",()=>{
      saveCurrentCat();
      activeCat=btn.dataset.cid;
      document.querySelectorAll(".cbtn").forEach(b=>{b.style.background="#f0f0f0";b.style.color="#555"});
      btn.style.background=hById(AH).color;btn.style.color="#fff";
      document.getElementById("catPanel").innerHTML=buildCatPanel(activeCat);
    }));
    document.getElementById("saveBB").addEventListener("click",async()=>{
      saveCurrentCat();
      const allMonthly={};
      CATS.forEach(cat=>{
        const cm=cb[cat.id]?.monthly||{};
        Object.entries(cm).forEach(([k,v])=>{allMonthly[k]=(allMonthly[k]||0)+(+v||0)});
      });
      const annualBudget=CATS.reduce((s,cat)=>s+(cb[cat.id]?.annual||0),0);
      const monthlyBudget=allMonthly[AM]||0;
      await saveBudget(AH,{...BD(AH),monthlyBudget,annualBudget,monthlyBudgets:allMonthly,categoryBudgets:cb});
      closeModal();showToast("התקציב עודכן ✓");renderBudget();
    });
  });
}
// ── CATEGORY DASHBOARD ───────────────────────────────────────
function openCatDash(cat){
  const house=hById(AH),data=BD(AH),expenses=data.expenses||[],cb=(data.categoryBudgets||{})[cat.id]||{};
  const yr=AM.split("-")[0];
  const mBudgets=data.monthlyBudgets||{};
  const catExps=expenses.filter(e=>e.categoryId===cat.id);
  const mExps=catExps.filter(e=>e.date?.startsWith(AM));
  const yExps=catExps.filter(e=>e.date?.startsWith(yr));
  const mT=mExps.reduce((s,e)=>s+e.amount,0),yT=yExps.reduce((s,e)=>s+e.amount,0);
  const cmb=cb.monthly||0,cyb=cb.annual||0;
  const mPct=cmb>0?Math.min((mT/cmb)*100,100):0,yPct=cyb>0?Math.min((yT/cyb)*100,100):0;
  function bar(p,c,h=8){const col=p>90?"#ef4444":p>70?"#f59e0b":c;return`<div style="background:#f0f0f0;border-radius:100px;height:${h}px;overflow:hidden"><div style="height:100%;width:${p}%;background:${col};border-radius:100px;transition:width .5s"></div></div>`}
  const monthRows=Array.from({length:12},(_,i)=>{
    const k=`${yr}-${String(i+1).padStart(2,"0")}`;
    const spent=catExps.filter(e=>e.date?.startsWith(k)).reduce((s,e)=>s+e.amount,0);
    const bgt=mBudgets[k]?((cb.monthly||0)):0;
    const pct=bgt>0?Math.min((spent/bgt)*100,100):0;
    return`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f9f9f9">
      <span style="font-size:11px;font-weight:600;color:#666;min-width:55px">${MONTHS[i]}</span>
      <div style="flex:1">${bar(pct,house.color,5)}</div>
      <span style="font-size:11px;font-weight:700;color:${house.color};min-width:60px;text-align:left">${fmt(spent)}</span>
    </div>`;
  }).join("");
  openModal(`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h2 style="margin:0;font-size:16px;font-weight:700">${cat.icon} ${cat.name}</h2>
      <button id="closeModal" style="background:none;border:none;font-size:19px;cursor:pointer">✕</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      <div style="background:${house.bg};border-radius:12px;padding:12px 14px">
        <div style="font-size:11px;font-weight:600;color:${house.color};margin-bottom:4px">חודש נוכחי</div>
        <div style="font-size:20px;font-weight:800;color:${house.color}">${fmt(mT)}</div>
        <div style="font-size:10px;color:#666;margin-bottom:6px">מתוך ${fmt(cmb)}</div>
        ${bar(mPct,house.color)}<div style="font-size:9px;color:#888;margin-top:2px">${mPct.toFixed(0)}%</div>
      </div>
      <div style="background:#f8f8f8;border-radius:12px;padding:12px 14px">
        <div style="font-size:11px;font-weight:600;color:#555;margin-bottom:4px">שנה נוכחית</div>
        <div style="font-size:20px;font-weight:800;color:#333">${fmt(yT)}</div>
        <div style="font-size:10px;color:#666;margin-bottom:6px">מתוך ${fmt(cyb)}</div>
        ${bar(yPct,"#667eea")}<div style="font-size:9px;color:#888;margin-top:2px">${yPct.toFixed(0)}%</div>
      </div>
    </div>
    <div style="margin-bottom:16px">
      <h4 style="font-size:13px;font-weight:700;margin-bottom:8px">פירוט חודשי – ${yr}</h4>
      ${monthRows}
    </div>
    <h4 style="font-size:13px;font-weight:700;margin-bottom:8px">הוצאות אחרונות</h4>
    ${mExps.length===0?`<p style="color:#bbb;font-size:12px;text-align:center;padding:10px">אין הוצאות החודש</p>`:
      [...mExps].reverse().map(exp=>`<div style="display:flex;align-items:center;padding:7px 0;border-bottom:1px solid #f5f5f5;gap:8px">
        <div style="flex:1;min-width:0"><div style="font-weight:600;font-size:12px">${exp.description||"הוצאה"}</div><div style="font-size:10px;color:#aaa">${exp.date}</div></div>
        <div style="font-weight:700;color:${house.color};font-size:13px">${fmt(exp.amount)}</div>
      </div>`).join("")}`,()=>{document.getElementById("closeModal").addEventListener("click",closeModal)});
}

function exportExcel(houseId){
  const house=hById(houseId),data=BD(houseId),expenses=data.expenses||[];
  const yr=AM.split("-")[0];
  let csv="\uFEFF";
  csv+="בית חינוך,קטגוריה,תאריך,תיאור,סכום\n";
  CATS.forEach(cat=>{
    const catExps=expenses.filter(e=>e.categoryId===cat.id).sort((a,b)=>a.date>b.date?1:-1);
    catExps.forEach(exp=>{
      csv+=`${house.name},${cat.name},${exp.date},"${(exp.description||"").replace(/"/g,"''")}",${exp.amount}\n`;
    });
  });
  csv+="\n\nסיכום לפי קטגוריה וחודש\n";
  csv+="קטגוריה,"+MONTHS.map((_,i)=>MONTHS[i]).join(",")+",סה\"כ\n";
  CATS.forEach(cat=>{
    const row=[cat.name];
    let total=0;
    for(let m=1;m<=12;m++){
      const k=`${yr}-${String(m).padStart(2,"0")}`;
      const s=expenses.filter(e=>e.categoryId===cat.id&&e.date?.startsWith(k)).reduce((s,e)=>s+e.amount,0);
      row.push(s);total+=s;
    }
    row.push(total);csv+=row.join(",")+"\n";
  });
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`תקציב_${house.name}_${yr}.csv`;a.click();
  showToast("הקובץ הורד ✓");
}

const ESCORT_DAYS=["ראשון","שני","שלישי","רביעי","חמישי"];

async function saveEscort(h,d){if(!HD[h])HD[h]={};HD[h].escort=d;await fbSet(`escort/${h}`,d)}
function getMonthDates(ym){
  const[y,m]=ym.split("-").map(Number);
  const dates=[];
  const d=new Date(y,m-1,1);
  while(d.getMonth()===m-1){
    const dow=d.getDay();
    if(dow>=0&&dow<=4){
      const mm=String(d.getMonth()+1).padStart(2,"0");
      const dd=String(d.getDate()).padStart(2,"0");
      dates.push(`${d.getFullYear()}-${mm}-${dd}`);
    }
    d.setDate(d.getDate()+1);
  }
  return dates;
}

    const dateLabel=`${dd}/${dm}`;
    const timeBlocks=ESCORT_TIMES.map(time=>{
      const isMorning=time==="בוקר";
      const slots=ESCORT_SLOTS.map(slot=>{
        const key=`${date}_${time}_${slot}`;
        const val=assignments[key]||"";
        return `<div style="flex:1;min-width:0;padding:6px 8px;background:${val?(isMorning?"#f0fdf4":"#fffbeb"):"#f9fafb"};border-radius:8px;text-align:center">
          <div style="font-size:10px;color:#888;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${slot}</div>
          <div style="font-size:12px;font-weight:700;color:${val?(isMorning?house.color:"#d97706"):"#bbb"};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${val||"פנוי"}</div>
        </div>`;
      }).join("");
      return `<div style="margin-bottom:6px">
        <div style="font-size:10px;font-weight:700;color:${isMorning?"#667eea":"#f59e0b"};margin-bottom:4px">${isMorning?"🌅 בוקר":"🌤️ צהריים"}</div>
        <div style="display:flex;gap:5px">${slots}</div>
      </div>`;
    }).join("");
    return `<div style="background:#fff;border-radius:12px;padding:12px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.07)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-size:14px;font-weight:800;color:${house.color}">${dayName} ${dateLabel}</div>
        <button class="editEscBtn btn" data-date="${date}" style="padding:6px 14px;background:${house.color};color:#fff;font-size:12px;border-radius:8px">✏️ עריכה</button>
      </div>
      ${timeBlocks}
    </div>`;
  }).join("");
  document.getElementById("main").innerHTML=`
    <div style="background:linear-gradient(135deg,${house.color},${house.accent});border-radius:18px;padding:20px 24px;margin-bottom:16px;color:#fff;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:9px">
      <div><h1 style="margin:0;font-size:22px;font-weight:800">בית ${house.name}</h1><p style="margin:2px 0 0;opacity:.8;font-size:12px">מלווי הסעות</p></div>
    </div>
    <div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:14px;padding:10px 16px">
      <button id="prevEM" style="background:none;border:none;font-size:16px;cursor:pointer;color:${house.color}">▶</button>
      <span style="font-weight:700;font-size:14px;flex:1;text-align:center">${mLabel(AM)}</span>
      <button id="nextEM" style="background:none;border:none;font-size:16px;cursor:pointer;color:${house.color}">◀</button>
    </div>
    <div style="padding:0 2px">${rows}</div>`;
  document.getElementById("prevEM")?.addEventListener("click",()=>{const[y,m]=AM.split("-").map(Number);const d=new Date(y,m-2,1);AM=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;renderEscort()});
  document.getElementById("nextEM")?.addEventListener("click",()=>{const[y,m]=AM.split("-").map(Number);const d=new Date(y,m,1);AM=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;renderEscort()});
  document.querySelectorAll(".editEscBtn").forEach(b=>b.addEventListener("click",()=>openEscortModal(b.dataset.date)));
}
function openEscortModal(date){
  const house=hById(AH),data=ED(AH),assignments={...data.assignments||{}};
  const dow=new Date(date).getDay();
  const d=new Date(date);
  const dateLabel=`${ESCORT_DAYS[dow]} ${d.getDate()}/${d.getMonth()+1}`;
  const staffMembers=SD(AH).members||[];
  const timeBlocks=ESCORT_TIMES.map(time=>`
    <div style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:700;color:${time==="בוקר"?"#667eea":"#f59e0b"};margin-bottom:8px;padding:6px 10px;background:${time==="בוקר"?"#f0f4ff":"#fffbeb"};border-radius:7px">
        ${time==="בוקר"?"🌅":"🌤️"} הסעת ${time}
      </div>
      ${ESCORT_SLOTS.map(slot=>{
        const key=`${date}_${time}_${slot}`;
        const val=assignments[key]||"";
        const opts=staffMembers.map(m=>`<option value="${m}" ${val===m?"selected":""}>${m}</option>`).join("");
        return`<div style="margin-bottom:8px">
          <label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:4px">🚌 ${slot}</label>
          <select class="input escInput" data-key="${key}" style="font-size:14px;padding:9px 10px;width:100%;border:1.5px solid #e5e7eb;border-radius:8px;background:#fff;-webkit-appearance:auto">
            <option value="">— בחר מלווה —</option>
            ${opts}
          </select>
        </div>`;
      }).join("")}
    </div>`).join("");
  openModal(`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="margin:0;font-size:16px;font-weight:700">🚌 מלווי הסעות – ${dateLabel}</h2>
      <button id="closeModal" style="background:none;border:none;font-size:19px;cursor:pointer">✕</button>
    </div>
    ${timeBlocks}
    <div style="display:flex;gap:7px;padding-top:12px;border-top:1px solid #f0f0f0">
      <button id="saveEsc" class="btn" style="flex:1;background:${house.color};color:#fff">שמור</button>
      <button id="cancelEsc" class="btn" style="border:1.5px solid #ddd;background:#fff;color:#666">ביטול</button>
    </div>`,()=>{
    document.getElementById("closeModal").addEventListener("click",closeModal);
    document.getElementById("cancelEsc").addEventListener("click",closeModal);
    document.getElementById("saveEsc").addEventListener("click",async()=>{
      const newAssign={...ED(AH).assignments||{}};
      document.querySelectorAll(".escInput").forEach(inp=>{
        const val=inp.value.trim();
        if(val)newAssign[inp.dataset.key]=val;
        else delete newAssign[inp.dataset.key];
      });
      await saveEscort(AH,{assignments:newAssign});
      closeModal();showToast("נשמר ✓");renderEscort();
    });
  });
}

function renderCal(){
  const house=hById(AH);
  const [yr,mo]=AM.split("-").map(Number);
  const firstDay=new Date(yr,mo-1,1);
  const lastDay=new Date(yr,mo,0);
  const startDow=firstDay.getDay();
  const daysInMonth=lastDay.getDate();
  const data=HD[AH]||{};
  const sched=(data.acts?.schedule)||{};
  const shifts=(data.staff?.shifts)||{};
  const escAssign=(data.escort?.assignments)||{};
  const DOW_HE=["א׳","ב׳","ג׳","ד׳","ה׳","ו׳","ש׳"];
  let cells=[];
  for(let i=0;i<startDow;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  const today=new Date();
  const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;
  const rows=[];
  for(let r=0;r<cells.length/7;r++){
    const rowCells=cells.slice(r*7,(r+1)*7).map((d,i)=>{
      if(!d)return`<td style="border:1px solid #f0f0f0;background:#fafafa;min-height:70px"></td>`;
      const dateStr=`${yr}-${String(mo).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const isToday=dateStr===todayStr;
      const isSat=i===6;
      const hasSched=(sched[dateStr]||[]).length>0;
      const hasStaff=Object.keys(shifts).some(k=>k.startsWith(dateStr));
      const hasEsc=Object.keys(escAssign).some(k=>k.startsWith(dateStr));
      const dots=[hasSched?"🎯":"",hasStaff?"👥":"",hasEsc?"🚌":""].filter(Boolean).join("");
      return`<td onclick="openCalDay('${dateStr}')" style="border:1px solid #f0f0f0;min-height:70px;padding:4px;cursor:pointer;vertical-align:top;background:${isToday?house.bg:"#fff"};transition:background .15s" onmouseenter="this.style.background='${house.bg}'" onmouseleave="this.style.background='${isToday?house.bg:"#fff"}'">
        <div style="font-size:13px;font-weight:${isToday?"800":"600"};color:${isSat?"#e53e3e":isToday?house.color:"#333"};width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:${isToday?house.color:"none"};color:${isToday?"#fff":isSat?"#e53e3e":"#333"}">${d}</div>
        <div style="font-size:10px;margin-top:3px;line-height:1.4">${dots}</div>
      </td>`;
    }).join("");
    rows.push(`<tr>${rowCells}</tr>`);
  }
  const headerRow=DOW_HE.map((d,i)=>`<th style="padding:6px 2px;font-size:11px;font-weight:700;color:${i===6?"#e53e3e":"#888"};text-align:center;border-bottom:2px solid #f0f0f0">${d}</th>`).join("");
  document.getElementById("main").innerHTML=`
    <div style="background:linear-gradient(135deg,${house.color},${house.accent});border-radius:18px;padding:20px 24px;margin-bottom:16px;color:#fff;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:9px">
      <div><h1 style="margin:0;font-size:22px;font-weight:800">בית ${house.name}</h1><p style="margin:2px 0 0;opacity:.8;font-size:12px">לוח שנה</p></div>
    </div>
    <div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:14px;padding:10px 16px">
      <button id="prevMC" style="background:none;border:none;font-size:16px;cursor:pointer;color:${house.color}">▶</button>
      <span style="font-weight:700;font-size:15px;flex:1;text-align:center">${mLabel(AM)}</span>
      <button id="nextMC" style="background:none;border:none;font-size:16px;cursor:pointer;color:${house.color}">◀</button>
    </div>
    <div class="card" style="padding:8px;overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;min-width:280px">
        <thead><tr>${headerRow}</tr></thead>
        <tbody>${rows.join("")}</tbody>
      </table>
    </div>
    <div style="display:flex;gap:12px;margin-top:10px;font-size:11px;color:#888;padding:0 4px">
      <span>🎯 פעילות</span><span>👥 כח אדם</span><span>🚌 הסעות</span>
    </div>`;
  document.getElementById("prevMC")?.addEventListener("click",()=>{const[y,m]=AM.split("-").map(Number);const d=new Date(y,m-2,1);AM=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;renderCal()});
  document.getElementById("nextMC")?.addEventListener("click",()=>{const[y,m]=AM.split("-").map(Number);const d=new Date(y,m,1);AM=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;renderCal()});
}
window.openCalDay=function(dateStr){
  const house=hById(AH);
  const data=HD[AH]||{};
  const acts=data.acts?.activities||[];
  const sched=data.acts?.schedule||{};
  const members=data.staff?.members||[];
  const shifts=data.staff?.shifts||{};
  const escAssign=data.escort?.assignments||{};
  const dayActs=(sched[dateStr]||[]).map(id=>acts.find(a=>a.id===id)).filter(Boolean);
  const dayShifts=shifts[dateStr]||{};
  const escSlots=["אגד להבות","אגד הרחבה","איסוף"];
  const escTimes=["בוקר","צהריים"];
  const d=new Date(dateStr+"T00:00:00");
  const dow=["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"][d.getDay()];
  const [dy,dm,dd]=dateStr.split("-");
  const label=`יום ${dow}, ${dd}/${dm}/${dy}`;
  const actRows=dayActs.map(a=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:${a.color||house.color}15;border-radius:8px;margin-bottom:5px">
    <span style="font-size:13px;font-weight:700;color:${a.color||house.color};flex:1">${a.name}</span>
    <span style="font-size:11px;color:#888">${a.duration||""}</span>
    <button class="rmActSched btn" data-date="${dateStr}" data-id="${a.id}" style="background:none;border:none;color:#ddd;font-size:12px;padding:1px">✕</button>
  </div>`).join("");
  const staffRows=members.map(m=>{
    const curShift=Object.entries(dayShifts).find(([,v])=>v===m)?.[0]||"";
    return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="font-size:12px;flex:1;font-weight:600">${m}</span>
      <select class="input staffShiftSel" data-member="${m}" data-date="${dateStr}" style="font-size:11px;padding:4px 6px;width:110px">
        <option value="">— ללא —</option>
        <option value="בוקר" ${curShift==="בוקר"?"selected":""}>🌅 בוקר</option>
        <option value="צהריים" ${curShift==="צהריים"?"selected":""}>🌤️ צהריים</option>
        <option value="ערב" ${curShift==="ערב"?"selected":""}>🌙 ערב</option>
        <option value="חופש" ${curShift==="חופש"?"selected":""}>🏖️ חופש</option>
        <option value="מחלה" ${curShift==="מחלה"?"selected":""}>🤒 מחלה</option>
      </select>
    </div>`;
  }).join("");
  const escRows=escTimes.map(time=>`<div style="margin-bottom:10px">
    <div style="font-size:11px;font-weight:700;color:${time==="בוקר"?"#667eea":"#f59e0b"};margin-bottom:5px">${time==="בוקר"?"🌅":"🌤️"} ${time}</div>
    ${escSlots.map(slot=>{
      const key=`${dateStr}_${time}_${slot}`;
      const val=escAssign[key]||"";
      const opts=members.map(m=>`<option value="${m}" ${val===m?"selected":""}>${m}</option>`).join("");
      return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
        <span style="font-size:11px;color:#666;width:80px">${slot}</span>
        <select class="input escDaySel" data-key="${key}" style="flex:1;font-size:11px;padding:4px 6px">
          <option value="">— פנוי —</option>${opts}
        </select>
      </div>`;
    }).join("")}
  </div>`).join("");
  openModal(`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h2 style="margin:0;font-size:15px;font-weight:800">${label}</h2>
      <button id="closeModal" style="background:none;border:none;font-size:19px;cursor:pointer">✕</button>
    </div>
    <div style="background:${house.bg};border-radius:10px;padding:12px 14px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-size:13px;font-weight:700;color:${house.color}">🎯 פעילויות</div>
        <button id="addActCalBtn" class="btn" style="padding:4px 10px;background:${house.color};color:#fff;font-size:11px">+ הוסף</button>
      </div>
      <div id="actsList">${actRows||'<div style="font-size:12px;color:#bbb;text-align:center;padding:8px">אין פעילויות ליום זה</div>'}</div>
    </div>
    <div style="background:#f0fdf4;border-radius:10px;padding:12px 14px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;color:#16a34a;margin-bottom:8px">👥 כח אדם</div>
      ${staffRows||'<div style="font-size:12px;color:#bbb">אין עובדים רשומים</div>'}
    </div>
    <div style="background:#fffbeb;border-radius:10px;padding:12px 14px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;color:#d97706;margin-bottom:8px">🚌 הסעות</div>
      ${escRows||'<div style="font-size:12px;color:#bbb">אין מלווים</div>'}
    </div>
    <div style="display:flex;gap:7px">
      <button id="saveCalDay" class="btn" style="flex:1;background:${house.color};color:#fff">שמור</button>
      <button id="cancelCalDay" class="btn" style="border:1.5px solid #ddd;background:#fff;color:#666">ביטול</button>
    </div>`,()=>{
    document.getElementById("closeModal").addEventListener("click",closeModal);
    document.getElementById("cancelCalDay").addEventListener("click",closeModal);
    document.getElementById("addActCalBtn").addEventListener("click",()=>{
      const acts2=HD[AH]?.acts?.activities||[];
      if(acts2.length===0){showToast("אין פעילויות בבנק — הוסף קודם מהמודול פעילויות","error");return;}
      const opts=acts2.map(a=>`<div class="pickAct btn" data-id="${a.id}" style="padding:8px 12px;background:${a.color||house.color}15;border-radius:8px;margin-bottom:5px;cursor:pointer;border:1.5px solid ${a.color||house.color}33">
        <div style="font-weight:700;font-size:12px;color:${a.color||house.color}">${a.name}</div>
        <div style="font-size:10px;color:#888">${a.duration||""} ${a.description?.substring(0,50)||""}</div>
      </div>`).join("");
      const overlay=document.createElement("div");
      overlay.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;display:flex;align-items:center;justify-content:center;padding:16px";
      overlay.innerHTML=`<div style="background:#fff;border-radius:16px;padding:20px;width:100%;max-width:400px;max-height:80vh;overflow-y:auto">
        <div style="display:flex;justify-content:space-between;margin-bottom:12px"><h3 style="margin:0;font-size:14px">בחר פעילות מהבנק</h3><button id="closePickAct" style="background:none;border:none;font-size:18px;cursor:pointer">✕</button></div>
        ${opts}
      </div>`;
      document.body.appendChild(overlay);
      overlay.querySelector("#closePickAct").addEventListener("click",()=>overlay.remove());
      overlay.querySelectorAll(".pickAct").forEach(btn=>btn.addEventListener("click",async()=>{
        const aid=btn.dataset.id;
        const curSched=HD[AH]?.acts?.schedule||{};
        const dayList=curSched[dateStr]||[];
        if(!dayList.includes(aid)){
          const newSched={...curSched,[dateStr]:[...dayList,aid]};
          await saveActs(AH,{...HD[AH].acts,schedule:newSched});
        }
        overlay.remove();
        openCalDay(dateStr);
      }));
    });
    document.querySelectorAll(".rmActSched").forEach(btn=>btn.addEventListener("click",async()=>{
      const curSched=HD[AH]?.acts?.schedule||{};
      const dayList=(curSched[dateStr]||[]).filter(id=>id!==btn.dataset.id);
      await saveActs(AH,{...HD[AH].acts,schedule:{...curSched,[dateStr]:dayList}});
      openCalDay(dateStr);
    }));
    document.getElementById("saveCalDay").addEventListener("click",async()=>{
      const curShifts={...HD[AH]?.staff?.shifts||{}};
      const dayShifts2={};
      document.querySelectorAll(".staffShiftSel").forEach(sel=>{
        if(sel.value)dayShifts2[sel.value]=sel.dataset.member;
      });
      if(Object.keys(dayShifts2).length>0)curShifts[dateStr]=dayShifts2;
      else delete curShifts[dateStr];
      await saveStaff(AH,{...HD[AH].staff,shifts:curShifts});
      const curEsc={...HD[AH]?.escort?.assignments||{}};
      document.querySelectorAll(".escDaySel").forEach(sel=>{
        if(sel.value)curEsc[sel.dataset.key]=sel.value;
        else delete curEsc[sel.dataset.key];
      });
      await saveEscort(AH,{...HD[AH].escort,assignments:curEsc});
      closeModal();showToast("נשמר ✓");renderCal();
    });
  });
};
